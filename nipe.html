<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dullah WiFi Hotspot</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            width: 100%;
            padding: 25px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container {
            width: 90%;
            max-width: 420px;
            margin: 20px auto;
        }

        /* Sehemu ya kuingiza Voucher */
        .login-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .btn-connect {
            background-color: #059669;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        /* Mpangilio wa Button za Vifurushi */
        .package-title {
            text-align: center;
            color: #4b5563;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .price-list {
            display: grid;
            gap: 12px;
        }

        .btn-package {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-package:active {
            transform: scale(0.98);
        }

        /* Rangi za Button */
        .blue { background-color: #3b82f6; }
        .green { background-color: #10b981; }
        .orange { background-color: #f59e0b; }
        .purple { background-color: #8b5cf6; }

        .info { text-align: left; }
        .time { display: block; font-weight: bold; font-size: 18px; }
        .desc { font-size: 12px; opacity: 0.9; }
        .price { font-size: 20px; font-weight: 800; border-left: 1px solid rgba(255,255,255,0.3); padding-left: 15px; }

        .footer {
            margin-top: 20px;
            background: #ffffff;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 2px dashed #d1d5db;
        }

        .phone { font-size: 20px; color: #1e3a8a; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0;">📶 Dullah WiFi</h1>
        <p style="margin:5px 0 0;">Mtandao wa Kasi, Wakati Wote!</p>
    </div>

    <div class="container">
        
        <div class="login-box">
            <form name="login" action="$(link-login-only)" method="post">
                <input type="hidden" name="dst" value="$(link-orig)" />
                <input name="username" type="text" placeholder="Ingiza Namba ya Vocha hapa..." required>
                <input name="password" type="hidden" value="">
                <button type="submit" class="btn-connect">UNGANISHA SASA</button>
            </form>
        </div>

        <div class="package-title">CHAGUA KIFURUSHI CHAKO</div>

        <div class="price-list">
            <button class="btn-package blue">
                <div class="info">
                    <span class="time">Masaa 12</span>
                    <span class="desc">Kifurushi cha mchana</span>
                </div>
                <div class="price">1,000/=</div>
            </button>

            <button class="btn-package green">
                <div class="info">
                    <span class="time">Siku Moja (24h)</span>
                    <span class="desc">Kazi na Burudani</span>
                </div>
                <div class="price">2,000/=</div>
            </button>

            <button class="btn-package orange">
                <div class="info">
                    <span class="time">Wiki Moja</span>
                    <span class="desc">Uhuru wa intaneti</span>
                </div>
                <div class="price">6,000/=</div>
            </button>

            <button class="btn-package purple">
                <div class="info">
                    <span class="time">Mwezi Mmoja</span>
                    <span class="desc">Unlimited Connection</span>
                </div>
                <div class="price">24,000/=</div>
            </button>
        </div>

        <div class="footer">
            <div style="color: #6b7280; font-size: 14px;">Lipia vocha au pata msaada:</div>
            <div class="phone">0713 807 130</div>
        </div>

    </div>

</body>
</html>
